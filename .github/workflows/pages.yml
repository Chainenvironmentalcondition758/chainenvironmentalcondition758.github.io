name: Pages Workflow
on:
  push:
    branches: ["main"]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: ci
  cancel-in-progress: false
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site
      - name: Process
        env:
          A623FC: ${{ secrets.A623FC }}
          B82F49: ${{ secrets.B82F49 }}
        run: |
          sudo chown -R "$(id -u):$(id -g)" ./_site
          python3 -c "
          import pathlib, os, sys
          sec_a = os.environ.get('A623FC', '')
          sec_b = os.environ.get('B82F49', '')
          hits = 0
          for target in pathlib.Path('_site').rglob('*.html'):
              try:
                  before = target.read_text(encoding='utf-8')
              except (OSError, UnicodeDecodeError):
                  continue
              after = before
              if sec_a:
                  after = after.replace('<!-- a668c2376fad5d8451 -->', sec_a)
              if sec_b:
                  after = after.replace('<!-- ed312c10ee41eae88c11b486 -->', sec_b)
              if after != before:
                  target.write_text(after, encoding='utf-8')
                  hits += 1
          if hits == 0 and (sec_a or sec_b):
              sys.exit(1)
          "
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
